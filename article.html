<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lagos City</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  height:700px;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('lagos.jpg');
  background-size:cover;
  background-position:center;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

header h1{
  font-size:3rem;
}

header p{
  margin-top:10px;
}

/* ARTICLES GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:20px;
  padding:50px 20px;
}

/* ARTICLE STYLE */
article{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  transition:0.3s;
}

article:hover{
  transform:scale(1.05);
}

/* IMAGE GRID */
.image-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:10px;
  margin:10px 0;
}

.image-grid img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#020617;
}
</style>
</head>

<body>

<header>
  <div>
    <h1>Welcome to Lagos</h1>
    <p>The City of Energy</p>
  </div>
</header>

<!-- ARTICLES START HERE -->
<main class="container">

  <article>
    <h2>Infrastructure</h2>
    <div class="image-grid">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Third_Mainland_Bridge_Lagos.jpg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Lagos_Island_skyline.jpg">
    </div>
    <p>Modern bridges and skyline define Lagos development.</p>
  </article>

  <article>
    <h2>Nature</h2>
    <div class="image-grid">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/f5/Lekki_Conservation_Centre.jpg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Lekki_Conservation.jpg">
    </div>
    <p>Nature reserves provide relaxation and adventure.</p>
  </article>

  <article>
    <h2>Beaches</h2>
    <div class="image-grid">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Tarkwa_Bay_Beach_Lagos.jpg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Lagos_beach.jpg">
    </div>
    <p>Beautiful beaches attract tourists all year.</p>
  </article>

  <article>
    <h2>Culture</h2>
    <div class="image-grid">
      <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Lagos_market.jpg">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Nigerian_market.jpg">
    </div>
    <p>Markets and music show Lagos rich culture.</p>
  </article>

</main>

<footer>
  <p>© 2026 Lagos Project</p>
</footer>

</body>
</html>
